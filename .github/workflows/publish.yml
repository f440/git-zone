name: Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install --global npm@^11.5.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Verify release tag matches package version
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "${GITHUB_REF_NAME}" = "${TAG_NAME}" ]; then
            echo "Release tag must start with v"
            exit 1
          fi

          if [ "${TAG_NAME}" != "${PACKAGE_VERSION}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Run tests
        run: bun test

      - name: Build CLI
        run: bun run build

      - name: Inspect publish tarball
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish
